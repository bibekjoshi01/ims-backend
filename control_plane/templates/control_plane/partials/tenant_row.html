<tr id="tenant-{{ tenant.id }}" class="group transition hover:bg-white/5">
  <td class="px-6 py-5">
    <div class="flex items-start gap-4">
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-indigo-500/15 text-sm font-semibold text-indigo-300 ring-1 ring-indigo-400/20">
        {{ tenant.name|slice:":1"|upper }}
      </div>
      <div>
        <p class="font-semibold text-white">{{ tenant.name }}</p>
        <p class="mt-1 text-sm text-slate-400">Schema: {{ tenant.schema_name }}</p>
      </div>
    </div>
  </td>
  <td class="px-6 py-5 text-sm text-slate-300">{{ tenant.subdomain }}</td>
  <td class="px-6 py-5">
    {% if tenant.is_active %}
      <span class="inline-flex items-center rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-semibold text-emerald-300">
        Active
      </span>
    {% else %}
      <span class="inline-flex items-center rounded-full bg-amber-500/15 px-3 py-1 text-xs font-semibold text-amber-300">
        Suspended
      </span>
    {% endif %}
  </td>
  <td class="px-6 py-5 text-sm text-slate-300">{{ tenant.created_at }}</td>
  <td class="px-6 py-5 text-right">
    <details data-action-menu class="relative z-30 inline-block text-left">
      <summary class="cursor-pointer list-none rounded-2xl border border-white/10 px-3 py-2 text-sm font-medium text-slate-200 transition hover:bg-white/5">
        Actions
      </summary>
      <div data-action-menu-panel class="absolute right-0 z-[70] mt-2 w-56 overflow-hidden rounded-3xl border border-white/10 bg-slate-950 p-2 shadow-xl">
        <a href="{% url 'control_plane:tenant-detail' tenant.id %}" class="flex items-center rounded-2xl px-4 py-3 text-sm text-slate-200 transition hover:bg-white/5">
          View details
        </a>
        <a href="{% url 'control_plane:tenant-users' tenant.id %}" class="flex items-center rounded-2xl px-4 py-3 text-sm text-slate-200 transition hover:bg-white/5">
          Manage users
        </a>
        <button
          type="button"
          data-modal-url="{% url 'control_plane:tenant-edit' tenant.id %}"
          class="flex w-full items-center rounded-2xl px-4 py-3 text-left text-sm text-slate-200 transition hover:bg-white/5"
        >
          Edit client
        </button>
        <div class="my-2 h-px bg-white/10"></div>
        {% if tenant.is_active %}
          <button
            type="button"
            data-modal-url="{% url 'control_plane:tenant-action-confirm' tenant.id 'deactivate' %}"
            class="flex w-full items-center rounded-2xl px-4 py-3 text-left text-sm text-amber-300 transition hover:bg-amber-500/10"
          >
            Suspend client
          </button>
        {% else %}
          <button
            type="button"
            data-modal-url="{% url 'control_plane:tenant-action-confirm' tenant.id 'activate' %}"
            class="flex w-full items-center rounded-2xl px-4 py-3 text-left text-sm text-emerald-300 transition hover:bg-emerald-500/10"
          >
            Activate client
          </button>
        {% endif %}
      </div>
    </details>
  </td>
</tr>
